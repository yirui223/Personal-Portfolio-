<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人作品集</title>
    <style>
        /* 全局重置和字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        h1 {
            font-size: 2.5rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        .bio {
            color: #333;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1rem;
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
        }
        .bio strong {
            color: #764ba2;
        }
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0 30px;
        }
        .skills span {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #333;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }
        .btn:hover {
            background: #764ba2;
        }
        .note {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #999;
        }
        .github-link {
            margin-top: 15px;
            display: block;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- HYR -->
        <div class="avatar">Y</div>
        
        <!-- 代码展示区 -->
        <h1>你好，我是 [何奕睿]</h1>
        <p class="subtitle">👨‍💻 大模型开发学习中 · 代码练习与作品集</p>
        
        <!-- 个人简介 -->
        <div class="bio">
            <strong>📚 关于这个仓库：</strong><br>
            这里存放了我跟随黑马程序员课程学习的代码练习（Python、SQL、Linux 等），
            以及我独立完成的一些小项目或者与同学合作的项目。<br>
            <strong>✨ 有“个人作品”标识的属于自己写的，没有则属于课堂练习。</strong>
        </div>
        
        <!-- 技能标签  -->
        <div class="skills">
            <span>🐍 Python</span>
            <span>🗄️ SQL</span>
            <span>🐧 Linux</span>
            <span>🌐 C++ (成长中）</span>
            <span>📊 数据分析</span>
            <span>机器学习，深度学习</span>
            <span>NLP,coze,RAG,微调，多模态</span>
        </div>
        
        <!-- 查看代码的按钮 (链接指向你的仓库) -->
        <a href="https://github.com/yirui223/Personal-Portfolio-" target="_blank" class="btn">
            📂 查看我的全部代码
        </a>
        
        <a href="https://github.com/yirui223" target="_blank" class="github-link">
            ⭐ 我的 GitHub 主页
        </a>
        <p class="note">—— 持续更新中 ——</p>
    </div>
</body>
</html>
